<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aprende Fácil - Plataforma Educativa</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --verde: #2ecc71;
  --azul: #3498db;
  --naranja: #f39c12;
  --rojo: #e74c3c;
  --morado: #9b59b6;
  --bg: #f0f7ff;
  --card: #fff;
  --texto: #2d3436;
  --shadow: 0 2px 8px rgba(0,0,0,0.1);
  --shadow2: 0 8px 20px rgba(0,0,0,0.15);
  --font: 'Nunito', sans-serif;
  --display: 'Fredoka One', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--texto); overflow-x: hidden; }

.main-header {
  background: linear-gradient(135deg, #74b9ff 0%, #a29bfe 40%, #fd79a8 100%);
  padding: 12px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow2);
}

.header-inner { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.logo-box { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.logo-owl { font-size: 36px; }
.logo-text { font-family: var(--display); color: #fff; }
.logo-text .big { font-size: 20px; display: block; }
.logo-text .small { font-size: 12px; opacity: 0.9; }

.nivel-btns { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; justify-content: center; }
.nivel-btn {
  padding: 10px 22px;
  border-radius: 50px;
  border: 3px solid rgba(255,255,255,0.5);
  background: rgba(255,255,255,0.2);
  color: #fff;
  font-family: var(--display);
  font-size: 16px;
  cursor: pointer;
  transition: all 0.3s;
}
.nivel-btn:hover, .nivel-btn.active {
  background: #fff;
  color: var(--azul);
  border-color: #fff;
  transform: scale(1.05);
}

.header-actions { display: flex; gap: 8px; margin-left: auto; align-items: center; }
.btn-exam { padding: 8px 16px; border-radius: 30px; border: 2px solid rgba(255,255,255,0.6); background: rgba(255,255,255,0.15); color: #fff; cursor: pointer; font-size: 13px; transition: all 0.2s; }
.btn-exam:hover { background: rgba(255,255,255,0.35); }

.app-body { display: flex; min-height: calc(100vh - 70px); }
.main-content { flex: 1; padding: 20px; overflow-y: auto; }

.section-header {
  background: linear-gradient(135deg, #3498db, #2ecc71);
  border-radius: 20px;
  padding: 18px 24px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  color: #fff;
  box-shadow: var(--shadow2);
}
.section-header h2 { font-family: var(--display); font-size: 26px; margin: 0; }

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.topic-card {
  background: #fff;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: all 0.3s;
  cursor: pointer;
  border: 2px solid transparent;
}
.topic-card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow2);
  border-color: #fdcb6e;
}

.card-img { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 56px; }
.card-body { padding: 14px; }
.card-title { font-weight: 800; font-size: 15px; margin-bottom: 6px; }
.card-sub { font-size: 12px; color: #888; margin-bottom: 10px; }

.btn-aprender {
  width: 100%;
  padding: 10px;
  border-radius: 30px;
  border: none;
  font-family: var(--display);
  font-size: 14px;
  color: #fff;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-aprender:hover { transform: scale(1.04); filter: brightness(1.1); }

.quiz-panel {
  background: #fff;
  border-radius: 24px;
  padding: 24px;
  box-shadow: var(--shadow2);
  margin-bottom: 24px;
}

.quiz-q {
  font-size: 17px;
  font-weight: 800;
  margin-bottom: 16px;
  line-height: 1.4;
}

.quiz-opts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}

.q-opt {
  padding: 12px 16px;
  border-radius: 12px;
  border: 2px solid #dfe6e9;
  background: #f8f9fa;
  cursor: pointer;
  font-weight: 700;
  font-size: 13px;
  transition: all 0.2s;
  text-align: left;
}
.q-opt:hover:not([disabled]) {
  border-color: #6c5ce7;
  background: #f0eeff;
}
.q-opt.correct {
  border-color: #2ecc71;
  background: #d4efdf;
  color: #1a5e36;
}
.q-opt.wrong {
  border-color: #e74c3c;
  background: #fde8e8;
  color: #7b241c;
}

.quiz-fb {
  padding: 12px 16px;
  border-radius: 10px;
  font-weight: 700;
  font-size: 14px;
  margin-bottom: 12px;
  display: none;
  line-height: 1.5;
}
.quiz-fb.ok {
  background: #d5f5e3;
  color: #1e8449;
  border: 1px solid #82e0aa;
  display: block;
}
.quiz-fb.fail {
  background: #fadbd8;
  color: #922b21;
  border: 1px solid #f1948a;
  display: block;
}

.btn-next {
  background: linear-gradient(135deg, #6c5ce7, #a29bfe);
  color: #fff;
  border: none;
  border-radius: 30px;
  padding: 10px 26px;
  font-weight: 800;
  font-size: 14px;
  cursor: pointer;
  margin-top: 12px;
}
.btn-next:hover { filter: brightness(1.1); }

.loading { text-align: center; padding: 40px; }
.spinner { display: inline-block; border: 4px solid #f3f3f3; border-top: 4px solid #6c5ce7; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

.view { display: none; }
.view.active { display: block; }

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.modal-overlay.open { display: flex; }

.modal-content {
  background: #fff;
  border-radius: 20px;
  padding: 30px;
  width: 90%;
  max-width: 600px;
  max-height: 80vh;
  overflow-y: auto;
}

@media (max-width: 768px) {
  .nivel-btn { padding: 7px 14px; font-size: 12px; }
  .cards-grid { grid-template-columns: 1fr; }
  .quiz-opts { grid-template-columns: 1fr; }
  .main-content { padding: 10px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="main-header">
  <div class="header-inner">
    <div class="logo-box">
      <span class="logo-owl">🦉</span>
      <div class="logo-text">
        <span class="big">Aprende Fácil</span>
        <span class="small">v8.1</span>
      </div>
    </div>
    <div class="nivel-btns">
      <button class="nivel-btn active" onclick="cambiarNivel('inicial')">🌱 Inicial</button>
      <button class="nivel-btn" onclick="cambiarNivel('primaria')">🎒 Primaria</button>
      <button class="nivel-btn" onclick="cambiarNivel('secundaria')">🎓 Secundaria</button>
    </div>
    <div class="header-actions">
      <button class="btn-exam" onclick="mostrarExamen()"><i class="fas fa-clipboard"></i> Examen</button>
    </div>
  </div>
</div>

<!-- CONTENIDO PRINCIPAL -->
<div class="app-body">
  <div class="main-content">
    
    <!-- Vista Dashboard -->
    <div id="view-dashboard" class="view active">
      <div class="section-header">
        <span style="font-size: 40px;">📚</span>
        <div>
          <h2>Temas disponibles</h2>
          <p>Selecciona un tema para aprender</p>
        </div>
      </div>
      <div class="cards-grid" id="temas-grid">
        <!-- Se llenará con JS -->
      </div>
    </div>

    <!-- Vista Examen -->
    <div id="view-examen" class="view">
      <div class="section-header">
        <span style="font-size: 40px;">📝</span>
        <div>
          <h2>Examen</h2>
          <p>Demuestra lo que has aprendido</p>
        </div>
      </div>
      
      <div id="examen-container" class="loading">
        <div class="spinner"></div>
        <p>Cargando examen...</p>
      </div>
      
      <div id="examen-content" style="display: none;">
        <div class="quiz-panel">
          <div id="exam-question" class="quiz-q"></div>
          <div id="exam-options" class="quiz-opts"></div>
          <div id="exam-feedback" class="quiz-fb"></div>
          <button class="btn-next" onclick="siguientePregunta()">Siguiente</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Modal para lecciones -->
<div id="leccion-modal" class="modal-overlay">
  <div class="modal-content">
    <button onclick="cerrarModal()" style="float: right; border: none; background: none; font-size: 24px; cursor: pointer;">×</button>
    <div id="leccion-contenido"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// DATOS Y CONFIGURACIÓN
// ═══════════════════════════════════════════════════════════

var db = {
  temas: [
    { id: 1, titulo: 'Suma básica', nivel: 'inicial', grado: 1, curso: 'matematica', icon: '➕' },
    { id: 2, titulo: 'Resta simple', nivel: 'inicial', grado: 1, curso: 'matematica', icon: '➖' },
    { id: 3, titulo: 'Lectura', nivel: 'inicial', grado: 1, curso: 'comunicacion', icon: '📖' },
    { id: 4, titulo: 'Escritura', nivel: 'inicial', grado: 2, curso: 'comunicacion', icon: '✏️' },
    { id: 5, titulo: 'Multiplicación', nivel: 'primaria', grado: 3, curso: 'matematica', icon: '✖️' },
    { id: 6, titulo: 'División', nivel: 'primaria', grado: 4, curso: 'matematica', icon: '÷' },
    { id: 7, titulo: 'Fracciones', nivel: 'primaria', grado: 5, curso: 'matematica', icon: '⅓' },
    { id: 8, titulo: 'Ecuaciones', nivel: 'secundaria', grado: 1, curso: 'matematica', icon: '∑' }
  ],
  preguntas: [
    { id: 1, pregunta: '¿Cuánto es 2 + 3?', opciones: ['4', '5', '6', '3'], correcta: 1 },
    { id: 2, pregunta: '¿Cuánto es 10 - 3?', opciones: ['5', '6', '7', '8'], correcta: 2 },
    { id: 3, pregunta: '¿Cuánto es 4 × 5?', opciones: ['15', '20', '25', '30'], correcta: 1 },
    { id: 4, pregunta: '¿Cuánto es 12 ÷ 3?', opciones: ['3', '4', '5', '6'], correcta: 1 },
    { id: 5, pregunta: 'El gato es un...', opciones: ['Pájaro', 'Mamífero', 'Pez', 'Insecto'], correcta: 1 }
  ]
};

var currentNivel = 'primaria';
var currentExamQuestion = 0;
var examRespuestas = [];

// ═══════════════════════════════════════════════════════════
// FUNCIONES PRINCIPALES
// ═══════════════════════════════════════════════════════════

function cambiarNivel(nivel) {
  currentNivel = nivel;
  document.querySelectorAll('.nivel-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  mostrarDashboard();
}

function mostrarDashboard() {
  ocultarVistas();
  document.getElementById('view-dashboard').classList.add('active');
  cargarTemas();
}

function cargarTemas() {
  var grid = document.getElementById('temas-grid');
  grid.innerHTML = '';
  
  var temasFiltrados = db.temas.filter(t => t.nivel === currentNivel);
  
  temasFiltrados.forEach(tema => {
    var colors = {
      matematica: '#3498db',
      comunicacion: '#2ecc71',
      ciencia: '#f39c12',
      personal: '#9b59b6'
    };
    
    var card = document.createElement('div');
    card.className = 'topic-card';
    card.innerHTML = `
      <div class="card-img" style="background: linear-gradient(135deg, ${colors[tema.curso] || '#6c5ce7'}, ${colors[tema.curso] || '#a29bfe'})99;">
        ${tema.icon}
      </div>
      <div class="card-body">
        <div class="card-title">${tema.titulo}</div>
        <div class="card-sub">${tema.grado}° - ${tema.curso}</div>
        <button class="btn-aprender" style="background: ${colors[tema.curso] || '#6c5ce7'};" onclick="abrirTema(${tema.id})">
          Aprender <i class="fas fa-arrow-right"></i>
        </button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function abrirTema(temaId) {
  var tema = db.temas.find(t => t.id === temaId);
  var contenido = document.getElementById('leccion-contenido');
  contenido.innerHTML = `
    <h2>${tema.titulo}</h2>
    <p>Contenido educativo para: <strong>${tema.titulo}</strong></p>
    <div style="margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 10px;">
      <p>Este es el material de aprendizaje para ${tema.titulo}.</p>
      <p style="margin-top: 10px; color: #888;">Sección en desarrollo...</p>
    </div>
  `;
  document.getElementById('leccion-modal').classList.add('open');
}

function cerrarModal() {
  document.getElementById('leccion-modal').classList.remove('open');
}

// ═══════════════════════════════════════════════════════════
// FUNCIONES DE EXAMEN
// ═══════════════════════════════════════════════════════════

function mostrarExamen() {
  ocultarVistas();
  document.getElementById('view-examen').classList.add('active');
  inicializarExamen();
}

function inicializarExamen() {
  currentExamQuestion = 0;
  examRespuestas = [];
  
  // Simular carga (500ms)
  setTimeout(() => {
    document.getElementById('examen-container').style.display = 'none';
    document.getElementById('examen-content').style.display = 'block';
    cargarPreguntaExamen();
  }, 500);
}

function cargarPreguntaExamen() {
  if (currentExamQuestion >= db.preguntas.length) {
    mostrarResultadoExamen();
    return;
  }
  
  var pregunta = db.preguntas[currentExamQuestion];
  
  // Limpiar feedback
  var feedback = document.getElementById('exam-feedback');
  feedback.style.display = 'none';
  feedback.innerHTML = '';
  
  // Mostrar pregunta
  document.getElementById('exam-question').textContent = 
    `${currentExamQuestion + 1}. ${pregunta.pregunta}`;
  
  // Mostrar opciones
  var optionsDiv = document.getElementById('exam-options');
  optionsDiv.innerHTML = '';
  
  pregunta.opciones.forEach((opcion, index) => {
    var btn = document.createElement('button');
    btn.className = 'q-opt';
    btn.textContent = opcion;
    btn.onclick = () => seleccionarRespuesta(index);
    optionsDiv.appendChild(btn);
  });
  
  // Resetear botón siguiente
  document.querySelector('.btn-next').disabled = false;
  document.querySelector('.btn-next').style.opacity = '1';
  document.querySelector('.btn-next').textContent = 
    currentExamQuestion === db.preguntas.length - 1 ? 'Terminar' : 'Siguiente';
}

function seleccionarRespuesta(indiceOpcion) {
  var pregunta = db.preguntas[currentExamQuestion];
  var esCorrecta = indiceOpcion === pregunta.correcta;
  
  examRespuestas.push({
    pregunta: currentExamQuestion,
    respuesta: indiceOpcion,
    correcta: esCorrecta
  });
  
  // Mostrar resultado
  var feedback = document.getElementById('exam-feedback');
  feedback.style.display = 'block';
  
  if (esCorrecta) {
    feedback.className = 'quiz-fb ok';
    feedback.innerHTML = '✅ ¡Correcto!';
  } else {
    feedback.className = 'quiz-fb fail';
    feedback.innerHTML = '❌ Incorrecto. La respuesta es: <strong>' + pregunta.opciones[pregunta.correcta] + '</strong>';
  }
  
  // Deshabilitar opciones
  document.querySelectorAll('.q-opt').forEach(btn => {
    btn.disabled = true;
    btn.style.opacity = '0.6';
  });
  
  // Marcar respuesta correcta
  document.querySelectorAll('.q-opt')[pregunta.correcta].classList.add('correct');
  
  if (!esCorrecta) {
    document.querySelectorAll('.q-opt')[indiceOpcion].classList.add('wrong');
  }
}

function siguientePregunta() {
  currentExamQuestion++;
  
  if (currentExamQuestion >= db.preguntas.length) {
    mostrarResultadoExamen();
  } else {
    cargarPreguntaExamen();
  }
}

function mostrarResultadoExamen() {
  var correctas = examRespuestas.filter(r => r.correcta).length;
  var porcentaje = Math.round((correctas / db.preguntas.length) * 100);
  
  var contenido = document.getElementById('examen-content');
  contenido.innerHTML = `
    <div class="quiz-panel" style="text-align: center;">
      <h2 style="font-size: 48px; margin-bottom: 20px;">🎉</h2>
      <h3>¡Examen completado!</h3>
      <p style="font-size: 24px; margin: 20px 0; color: #6c5ce7; font-weight: bold;">
        ${correctas} de ${db.preguntas.length} preguntas correctas
      </p>
      <p style="font-size: 20px; color: #f39c12; margin-bottom: 20px;">
        <strong>${porcentaje}%</strong>
      </p>
      <button class="btn-next" onclick="mostrarDashboard()" style="background: #2ecc71;">
        Volver al inicio
      </button>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════
// UTILIDADES
// ═══════════════════════════════════════════════════════════

function ocultarVistas() {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
}

// Inicializar
document.addEventListener('DOMContentLoaded', () => {
  mostrarDashboard();
});

</script>

</body>
</html>
