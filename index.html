<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aprende Fácil: Mi Escuela Didáctica</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
:root{--verde:#2ecc71;--verde2:#27ae60;--azul:#3498db;--naranja:#f39c12;--naranja2:#e67e22;--rojo:#e74c3c;--morado:#9b59b6;--cyan:#00cec9;--amarillo:#fdcb6e;--bg:#f0f7ff;--card:#fff;--texto:#2d3436;--muted:#636e72;--font:'Nunito',sans-serif;--display:'Fredoka One',cursive;--shadow:0 6px 24px rgba(0,0,0,0.10);--shadow2:0 12px 40px rgba(0,0,0,0.15)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--texto);overflow-x:hidden}
.cloud-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.cloud{position:absolute;background:rgba(255,255,255,0.5);border-radius:50px;animation:drift linear infinite}
@keyframes drift{from{transform:translateX(-200px)}to{transform:translateX(calc(100vw + 200px))}}

.main-header{background:linear-gradient(135deg,#74b9ff 0%,#a29bfe 40%,#fd79a8 100%);padding:12px 20px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.2)}
.header-inner{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo-box{display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer}
.logo-text .big{font-size:20px;font-family:var(--display);color:#fff;display:block}
.nivel-btn{padding:10px 22px;border-radius:50px;border:3px solid rgba(255,255,255,0.5);background:rgba(255,255,255,0.2);color:#fff;font-family:var(--display);cursor:pointer;transition:0.25s}
.nivel-btn.active{background:#fff;color:var(--azul);border-color:#fff}

.sidebar{width:200px;background:linear-gradient(180deg,#fff8f0,#ffe8d6);border-right:3px solid #ffeaa7;padding:16px 10px;position:sticky;top:70px;height:calc(100vh - 70px);overflow-y:auto}
.grado-btn{display:flex;align-items:center;gap:8px;width:100%;padding:10px;border-radius:12px;border:2px solid transparent;background:rgba(255,255,255,0.7);margin-bottom:6px;font-weight:700;cursor:pointer}
.grado-btn.active{background:var(--naranja);color:#fff}

.view{display:none}.view.active{display:block}
.main-content{flex:1;padding:20px}

/* ADMIN PANEL */
.admin-card-lesson { background: #fff; border-radius: 15px; border-left: 6px solid var(--azul); border: 1px solid #eee; margin-bottom: 10px; transition: 0.2s; }
.admin-card-lesson:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
.paste-area { width: 100%; height: 150px; border: 2px dashed #cbd5e0; border-radius: 12px; padding: 10px; font-family: monospace; font-size: 12px; }

/* LESSON VIDEO HIDDEN BY DEFAULT */
.video-container-hidden { display: none; margin-top: 20px; border-radius: 15px; overflow: hidden; box-shadow: var(--shadow); }
.btn-video-toggle { background: linear-gradient(135deg, #ff7675, #d63031); color: white; border: none; padding: 12px 25px; border-radius: 30px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 10px; margin: 10px 0; }
</style>
</head>
<body>

<header class="main-header">
    <div class="header-inner">
        <div class="logo-box" onclick="showView('dashboard')">
            <div style="font-size:30px">🦉</div>
            <div class="logo-text"><span class="big">Aprende Fácil</span></div>
        </div>
        <div class="nivel-btns">
            <button class="nivel-btn active" onclick="setNivel('primaria')">🎒 PRIMARIA</button>
            <button class="nivel-btn" onclick="setNivel('secundaria')">🎓 SECUNDARIA</button>
        </div>
        <div class="header-actions">
            <button class="btn-admin-top btn btn-sm btn-light rounded-pill opacity-50" onclick="showAdminLogin()" id="adminLoginBtn"><i class="fas fa-lock"></i> Acceso Profe</button>
            <div id="adminBadge" style="display:none" class="badge bg-warning text-dark p-2 rounded-pill"><i class="fas fa-user-shield"></i> Modo Admin</div>
        </div>
    </div>
</header>

<div class="app-body d-flex">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-title text-center fw-bold mb-3">Grados</div>
        <div id="gradosBtns"></div>
    </aside>

    <main class="main-content">
        <!-- DASHBOARD ALUMNO -->
        <div class="view active" id="view-dashboard">
            <div id="courseTabs" class="d-flex gap-2 mb-4 overflow-auto"></div>
            <div class="cards-grid row" id="cardsGrid"></div>
        </div>

        <!-- VISTA LECCIÓN -->
        <div class="view" id="view-lesson">
            <button class="btn btn-outline-secondary mb-3 rounded-pill" onclick="showView('dashboard')"><i class="fas fa-arrow-left"></i> Volver</button>
            <div class="row">
                <div class="col-md-8">
                    <div class="card p-4 shadow-sm border-0 rounded-4">
                        <h2 id="lesTitle" class="fw-bold"></h2>
                        <hr>
                        <h5><i class="fas fa-book-open text-primary"></i> Concepto Clave</h5>
                        <p id="lesConcepto" class="text-muted"></p>
                        
                        <!-- BOTÓN PARA VER VIDEO (No se muestra al inicio) -->
                        <button class="btn-video-toggle" id="btnVideoToggle" onclick="toggleLessonVideo()">
                            <i class="fas fa-play-circle"></i> 🎬 Ver Video Educativo de la Clase
                        </button>
                        <div class="video-container-hidden" id="lesVideoContainer">
                            <div class="ratio ratio-16x9">
                                <iframe id="lesIframe" src="" allowfullscreen></iframe>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-3 shadow-sm border-0 rounded-4 bg-light">
                        <h5><i class="fas fa-lightbulb text-warning"></i> ¿Sabías que?</h5>
                        <p id="lesFact" class="small"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- PANEL DE CONTROL (SOLO ADMIN) -->
        <div class="view" id="view-admin" style="display:none">
            <div class="card p-4 shadow-lg border-0 rounded-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3>⚙️ Panel de Control Escolar</h3>
                    <button class="btn btn-danger btn-sm rounded-pill" onclick="logoutAdmin()">Cerrar Sesión</button>
                </div>
                
                <div class="alert alert-info">
                    <strong>Plantilla de Carga Masiva:</strong> Copia tus datos de Excel en este orden: <br>
                    <code>ID | Nivel | Grado | Curso | Título | Concepto | VideoURL | DatoCurioso</code>
                </div>

                <div class="d-flex gap-2 mb-3">
                    <button class="btn btn-primary rounded-pill" onclick="abrirModalPegado()"><i class="fas fa-paste"></i> Pegado Masivo Excel</button>
                    <input type="text" id="adminSearch" class="form-control rounded-pill" placeholder="Buscar tema..." oninput="renderAdminList()">
                </div>

                <div id="adminListContainer" class="mt-3"></div>
            </div>
        </div>
    </main>
</div>

<script>
let db = { temas: [], preguntas: [] };
let currentNivel = 'primaria';
let currentGrado = 1;
let currentCurso = 'todos';
let isAdmin = false;

const cursColors = {
    matematica: { g1:'#3498db', i:'📐' },
    comunicacion: { g1:'#2ecc71', i:'📖' },
    ciencia: { g1:'#f39c12', i:'🔬' },
    personal: { g1:'#9b59b6', i:'🌍' }
};

// --- SEGURIDAD Y ACCESO ---
function showAdminLogin() {
    Swal.fire({
        title: 'Acceso Administrador',
        input: 'password',
        inputPlaceholder: 'Ingresa la clave maestra',
        showCancelButton: true,
        confirmButtonText: 'Entrar'
    }).then((res) => {
        if(res.value === '1234') { // Cambia tu contraseña aquí
            isAdmin = true;
            document.getElementById('adminBadge').style.display = 'block';
            document.getElementById('adminLoginBtn').style.display = 'none';
            showView('admin');
            renderAdminList();
        } else if(res.value) {
            Swal.fire('Error', 'Clave incorrecta', 'error');
        }
    });
}

function logoutAdmin() {
    isAdmin = false;
    document.getElementById('adminBadge').style.display = 'none';
    document.getElementById('adminLoginBtn').style.display = 'block';
    showView('dashboard');
}

function showView(v) {
    if(v === 'admin' && !isAdmin) { showView('dashboard'); return; }
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.getElementById('view-' + v).classList.add('active');
    if(v === 'admin') document.getElementById('view-admin').style.display = 'block';
}

// --- GESTIÓN DE LECCIONES (ADMIN) ---
function abrirModalPegado() {
    Swal.fire({
        title: 'Pegado Masivo desde Excel',
        html: `
            <textarea id="excelPasteArea" class="paste-area" placeholder="Pega aquí las celdas de tu Excel..."></textarea>
            <p class="small text-muted mt-2">Columnas: ID, Nivel, Grado, Curso, Título, Concepto, Video, Dato</p>
        `,
        showCancelButton: true,
        confirmButtonText: 'Procesar Datos',
        preConfirm: () => document.getElementById('excelPasteArea').value
    }).then((res) => {
        if(res.isConfirmed) procesarExcel(res.value);
    });
}

function procesarExcel(data) {
    const filas = data.split('\n');
    filas.forEach(f => {
        const c = f.split('\t');
        if(c.length >= 5) {
            const nuevo = {
                id: c[0].trim(),
                nivel: c[1].toLowerCase().trim(),
                grado: parseInt(c[2]),
                curso: c[3].toLowerCase().trim(),
                titulo: c[4].trim(),
                concepto: c[5] || '',
                video: c[6] || '',
                dato: c[7] || ''
            };
            const idx = db.temas.findIndex(t => t.id === nuevo.id);
            if(idx !== -1) db.temas[idx] = nuevo; else db.temas.push(nuevo);
        }
    });
    localStorage.setItem('af_db', JSON.stringify(db));
    renderAdminList();
    renderDashboard();
    Swal.fire('¡Éxito!', 'Datos cargados correctamente', 'success');
}

function renderAdminList() {
    const container = document.getElementById('adminListContainer');
    const search = document.getElementById('adminSearch').value.toLowerCase();
    container.innerHTML = '';
    
    db.temas.filter(t => t.titulo.toLowerCase().includes(search)).forEach((t, i) => {
        container.innerHTML += `
            <div class="admin-card-lesson p-3 d-flex justify-content-between align-items-center">
                <div>
                    <strong>${t.titulo}</strong> <br>
                    <small class="text-muted">${t.nivel} - ${t.grado}° - ${t.curso}</small>
                </div>
                <div>
                    <button class="btn btn-sm btn-outline-danger" onclick="eliminarTema(${i})"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        `;
    });
}

function eliminarTema(i) {
    db.temas.splice(i, 1);
    localStorage.setItem('af_db', JSON.stringify(db));
    renderAdminList();
}

// --- VISTA ALUMNO ---
function setNivel(n) {
    currentNivel = n;
    renderGrados();
    renderDashboard();
}

function renderGrados() {
    const container = document.getElementById('gradosBtns');
    container.innerHTML = '';
    const max = currentNivel === 'primaria' ? 6 : 5;
    for(let i=1; i<=max; i++) {
        container.innerHTML += `<button class="grado-btn ${i===currentGrado?'active':''}" onclick="setGrado(${i})">${i}° Grado</button>`;
    }
}

function setGrado(g) {
    currentGrado = g;
    renderGrados();
    renderDashboard();
}

function renderDashboard() {
    const grid = document.getElementById('cardsGrid');
    grid.innerHTML = '';
    const filtrados = db.temas.filter(t => t.nivel === currentNivel && t.grado == currentGrado);
    
    filtrados.forEach(t => {
        const color = cursColors[t.curso]?.g1 || '#ccc';
        grid.innerHTML += `
            <div class="col-md-4 mb-3">
                <div class="card shadow-sm border-0 rounded-4 overflow-hidden h-100" onclick="verLeccion('${t.id}')" style="cursor:pointer">
                    <div style="height:100px; background:${color}; display:flex; align-items:center; justify-content:center; color:white; font-size:40px">
                        ${cursColors[t.curso]?.i || '📚'}
                    </div>
                    <div class="card-body">
                        <small class="text-uppercase fw-bold" style="color:${color}">${t.curso}</small>
                        <h6 class="fw-bold">${t.titulo}</h6>
                        <button class="btn btn-sm btn-primary w-100 rounded-pill mt-2">¡Aprender!</button>
                    </div>
                </div>
            </div>
        `;
    });
}

function verLeccion(id) {
    const t = db.temas.find(x => x.id === id);
    if(!t) return;
    
    document.getElementById('lesTitle').textContent = t.titulo;
    document.getElementById('lesConcepto').textContent = t.concepto;
    document.getElementById('lesFact').textContent = t.dato || '¡Sigue explorando para aprender más!';
    
    // Configurar Video pero mantenerlo oculto
    const videoId = t.video.includes('v=') ? t.video.split('v=')[1].split('&')[0] : t.video.split('/').pop();
    document.getElementById('lesIframe').src = `https://www.youtube.com/embed/${videoId}`;
    document.getElementById('lesVideoContainer').style.display = 'none';
    document.getElementById('btnVideoToggle').innerHTML = '<i class="fas fa-play-circle"></i> 🎬 Ver Video Educativo de la Clase';
    
    showView('lesson');
}

function toggleLessonVideo() {
    const container = document.getElementById('lesVideoContainer');
    const btn = document.getElementById('btnVideoToggle');
    if(container.style.display === 'none') {
        container.style.display = 'block';
        btn.innerHTML = '<i class="fas fa-eye-slash"></i> Ocultar Video';
    } else {
        container.style.display = 'none';
        btn.innerHTML = '<i class="fas fa-play-circle"></i> 🎬 Ver Video Educativo de la Clase';
    }
}

// INICIO
const saved = localStorage.getItem('af_db');
if(saved) db = JSON.parse(saved);
setNivel('primaria');

</script>
</body>
</html>
