<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aprende Fácil - Examen</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container-exam {
  background: white;
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  max-width: 700px;
  width: 100%;
}

.header-exam {
  text-align: center;
  margin-bottom: 30px;
}

.header-exam h1 {
  color: #667eea;
  font-size: 32px;
  margin-bottom: 10px;
}

.progress-bar-exam {
  width: 100%;
  height: 8px;
  background: #e0e0e0;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 20px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #667eea, #764ba2);
  transition: width 0.3s;
}

.counter {
  text-align: right;
  font-size: 14px;
  color: #888;
  margin-bottom: 20px;
}

.question-box {
  background: #f8f9fa;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 25px;
}

.question-title {
  font-size: 18px;
  font-weight: 700;
  color: #2d3436;
  margin-bottom: 20px;
  line-height: 1.5;
}

.options-grid {
  display: grid;
  gap: 12px;
  margin-bottom: 20px;
}

.option-btn {
  padding: 15px;
  border: 2px solid #e0e0e0;
  background: white;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
  text-align: left;
  font-weight: 600;
  transition: all 0.3s;
}

.option-btn:hover {
  border-color: #667eea;
  background: #f0f3ff;
}

.option-btn.selected {
  border-color: #667eea;
  background: #e8ecff;
}

.option-btn.correct {
  border-color: #2ecc71;
  background: #d5f5e3;
  color: #0f6e56;
}

.option-btn.wrong {
  border-color: #e74c3c;
  background: #fde8e8;
  color: #a32d2d;
}

.option-btn:disabled {
  cursor: not-allowed;
  opacity: 0.7;
}

.feedback-message {
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  font-weight: 600;
  display: none;
}

.feedback-message.show {
  display: block;
}

.feedback-ok {
  background: #d5f5e3;
  color: #0f6e56;
  border: 2px solid #2ecc71;
}

.feedback-wrong {
  background: #fde8e8;
  color: #a32d2d;
  border: 2px solid #e74c3c;
}

.btn-continue {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 20px;
}

.btn-continue:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
}

.btn-continue:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.result-screen {
  text-align: center;
  display: none;
}

.result-screen.show {
  display: block;
}

.result-emoji {
  font-size: 80px;
  margin-bottom: 20px;
}

.result-title {
  font-size: 28px;
  font-weight: 700;
  color: #667eea;
  margin-bottom: 20px;
}

.result-score {
  font-size: 48px;
  font-weight: 700;
  color: #764ba2;
  margin-bottom: 10px;
}

.result-text {
  font-size: 16px;
  color: #666;
  margin-bottom: 30px;
}

.loading-screen {
  text-align: center;
  display: none;
}

.loading-screen.show {
  display: block;
}

.spinner {
  width: 50px;
  height: 50px;
  border: 4px solid #e0e0e0;
  border-top: 4px solid #667eea;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@media (max-width: 600px) {
  .container-exam {
    padding: 20px;
  }
  
  .header-exam h1 {
    font-size: 24px;
  }
  
  .question-title {
    font-size: 16px;
  }
  
  .option-btn {
    font-size: 14px;
    padding: 12px;
  }
}
</style>
</head>
<body>

<div class="container-exam">
  
  <!-- PANTALLA DE CARGA -->
  <div class="loading-screen show" id="loadingScreen">
    <div class="spinner"></div>
    <p style="color: #667eea; font-weight: 600;">Cargando examen...</p>
  </div>

  <!-- PANTALLA DE EXAMEN -->
  <div id="examScreen" style="display: none;">
    <div class="header-exam">
      <h1>📝 Examen</h1>
      <div class="progress-bar-exam">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <div class="counter">
        <span id="counterText">Pregunta 1 de 5</span>
      </div>
    </div>

    <div class="feedback-message" id="feedback"></div>

    <div class="question-box">
      <div class="question-title" id="questionText"></div>
      <div class="options-grid" id="optionsContainer"></div>
    </div>

    <button class="btn-continue" id="btnContinue" disabled onclick="nextQuestion()">
      Siguiente
    </button>
  </div>

  <!-- PANTALLA DE RESULTADOS -->
  <div class="result-screen" id="resultScreen">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-title">¡Examen completado!</div>
    <div class="result-score" id="resultScore">0/0</div>
    <div style="font-size: 24px; color: #f39c12; margin-bottom: 20px;">
      <span id="resultPercent">0%</span>
    </div>
    <div class="result-text" id="resultMessage"></div>
    <button class="btn-continue" onclick="reloadPage()" style="margin-top: 0;">
      Volver a intentar
    </button>
  </div>

</div>

<script>
// ════════════════════════════════════════════
// DATOS DEL EXAMEN
// ════════════════════════════════════════════

const preguntas = [
  {
    id: 1,
    pregunta: "¿Cuánto es 2 + 3?",
    opciones: ["4", "5", "6", "7"],
    correcta: 1
  },
  {
    id: 2,
    pregunta: "¿Cuánto es 10 - 4?",
    opciones: ["5", "6", "7", "8"],
    correcta: 1
  },
  {
    id: 3,
    pregunta: "¿Cuánto es 3 × 4?",
    opciones: ["10", "11", "12", "13"],
    correcta: 2
  },
  {
    id: 4,
    pregunta: "¿Cuánto es 20 ÷ 5?",
    opciones: ["3", "4", "5", "6"],
    correcta: 1
  },
  {
    id: 5,
    pregunta: "¿Cuál es la capital de Perú?",
    opciones: ["Arequipa", "Lima", "Cusco", "Trujillo"],
    correcta: 1
  }
];

// ════════════════════════════════════════════
// VARIABLES GLOBALES
// ════════════════════════════════════════════

let currentQuestion = 0;
let respuestas = [];
let selectedOption = -1;

// ════════════════════════════════════════════
// FUNCIONES DEL EXAMEN
// ════════════════════════════════════════════

function initExam() {
  // Simular carga de 1 segundo
  setTimeout(() => {
    document.getElementById('loadingScreen').classList.remove('show');
    document.getElementById('examScreen').style.display = 'block';
    loadQuestion();
  }, 1000);
}

function loadQuestion() {
  // Limpiar variables
  selectedOption = -1;
  document.getElementById('btnContinue').disabled = true;
  document.getElementById('feedback').classList.remove('show', 'feedback-ok', 'feedback-wrong');

  // Obtener pregunta actual
  const pregunta = preguntas[currentQuestion];
  
  // Actualizar contador
  const total = preguntas.length;
  document.getElementById('counterText').textContent = 
    `Pregunta ${currentQuestion + 1} de ${total}`;
  
  // Actualizar progreso
  const progress = ((currentQuestion + 1) / total) * 100;
  document.getElementById('progressFill').style.width = progress + '%';
  
  // Mostrar pregunta
  document.getElementById('questionText').textContent = pregunta.pregunta;
  
  // Limpiar y crear opciones
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  
  pregunta.opciones.forEach((opcion, index) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opcion;
    btn.type = 'button';
    btn.onclick = () => selectOption(index);
    container.appendChild(btn);
  });
  
  // Actualizar texto del botón
  if (currentQuestion === preguntas.length - 1) {
    document.getElementById('btnContinue').textContent = 'Terminar';
  } else {
    document.getElementById('btnContinue').textContent = 'Siguiente';
  }
}

function selectOption(index) {
  selectedOption = index;
  const pregunta = preguntas[currentQuestion];
  const esCorrecta = index === pregunta.correcta;
  
  // Marcar todos los botones
  const botones = document.querySelectorAll('.option-btn');
  botones.forEach((btn, i) => {
    btn.disabled = true;
    btn.classList.remove('selected', 'correct', 'wrong');
    
    if (i === pregunta.correcta) {
      btn.classList.add('correct');
    } else if (i === index && !esCorrecta) {
      btn.classList.add('wrong');
    }
  });
  
  // Guardar respuesta
  respuestas.push({
    pregunta: currentQuestion,
    seleccionada: index,
    correcta: esCorrecta
  });
  
  // Mostrar feedback
  const feedback = document.getElementById('feedback');
  feedback.classList.add('show');
  
  if (esCorrecta) {
    feedback.classList.add('feedback-ok');
    feedback.classList.remove('feedback-wrong');
    feedback.innerHTML = '✅ ¡Respuesta correcta!';
  } else {
    feedback.classList.add('feedback-wrong');
    feedback.classList.remove('feedback-ok');
    feedback.innerHTML = `❌ Incorrecto. La respuesta correcta es: <strong>${pregunta.opciones[pregunta.correcta]}</strong>`;
  }
  
  // Habilitar botón siguiente
  document.getElementById('btnContinue').disabled = false;
}

function nextQuestion() {
  // Validar que se seleccionó una opción
  if (selectedOption === -1) {
    alert('Por favor selecciona una opción');
    return;
  }
  
  currentQuestion++;
  
  if (currentQuestion >= preguntas.length) {
    showResults();
  } else {
    loadQuestion();
  }
}

function showResults() {
  // Ocultar examen
  document.getElementById('examScreen').style.display = 'none';
  
  // Calcular resultados
  const correctas = respuestas.filter(r => r.correcta).length;
  const total = preguntas.length;
  const porcentaje = Math.round((correctas / total) * 100);
  
  // Mostrar resultados
  document.getElementById('resultScreen').classList.add('show');
  document.getElementById('resultScore').textContent = `${correctas}/${total}`;
  document.getElementById('resultPercent').textContent = `${porcentaje}%`;
  
  // Mensaje según calificación
  let mensaje = '';
  let emoji = '';
  
  if (porcentaje === 100) {
    emoji = '🏆';
    mensaje = '¡Excelente! Obtuviste una calificación perfecta.';
  } else if (porcentaje >= 80) {
    emoji = '🎉';
    mensaje = '¡Muy bien! Tu desempeño fue excelente.';
  } else if (porcentaje >= 60) {
    emoji = '😊';
    mensaje = 'Bien hecho. Sigue practicando para mejorar.';
  } else {
    emoji = '📚';
    mensaje = 'Necesitas practicar más. ¡Vuelve a intentar!';
  }
  
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultMessage').textContent = mensaje;
}

function reloadPage() {
  location.reload();
}

// ════════════════════════════════════════════
// INICIAR
// ════════════════════════════════════════════

window.addEventListener('DOMContentLoaded', () => {
  initExam();
});
</script>

</body>
</html>
